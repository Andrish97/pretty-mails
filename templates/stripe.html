<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#eef9f7;color:#122624;font:16px/1.58 'Plus Jakarta Sans','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #cfe8e2;border-radius:12px;background:#ffffff;border-spacing:0;overflow:hidden;">
    <tr>
      <td style="width:8px;background:linear-gradient(180deg,var(--template-accent-1),var(--template-accent-2));"></td>
      <td style="padding:16px;">
        <div style="display:grid;gap:12px;">
          <div style="padding:10px 12px;border-radius:10px;border:1px solid #d8ece8;background:#f4fcfa;">{{greeting_block}}</div>
          <div style="padding:12px;border-radius:10px;border:1px solid #d8ece8;background:#ffffff;">{{content_block}}</div>
          <div style="padding:12px;border-radius:10px;border:1px solid #d8ece8;background:#f7fdfc;">{{quote_block}}</div>
          <div style="padding:12px;border-radius:10px;border:1px solid #d8ece8;background:#ffffff;">{{attachments_block}}</div>
          <div style="padding:12px;border-radius:10px;border:1px solid #d8ece8;background:#f4fcfa;">{{signature_block}}</div>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
