<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#f7f2ea;color:#2a1f17;font:17px/1.65 'Lora','Georgia',serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #dfd1c0;background:#fffdf8;border-spacing:0;">
    <tr><td style="padding:16px 20px;border-bottom:2px solid #e5d9ca;color:var(--template-accent-1);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;">Journal</td></tr>
    <tr><td style="padding:18px 20px;"><div style="padding:12px 14px;border-left:4px solid var(--template-accent-2);background:#fbf6ef;">{{greeting_block}}</div></td></tr>
    <tr><td style="padding:0 20px 14px;"><div style="padding:0 0 2px;">{{content_block}}</div></td></tr>
    <tr><td style="padding:0 20px 14px;"><div style="padding:12px 14px;border:1px solid #e6dbcf;background:#fcf8f2;">{{quote_block}}</div></td></tr>
    <tr><td style="padding:0 20px 14px;"><div style="padding:10px 12px;border-top:1px solid #e5d9ca;border-bottom:1px solid #e5d9ca;background:#fff;">{{attachments_block}}</div></td></tr>
    <tr><td style="padding:0 20px 18px;"><div style="padding-top:12px;border-top:2px solid #e5d9ca;">{{signature_block}}</div></td></tr>
  </table>
</body>
</html>
