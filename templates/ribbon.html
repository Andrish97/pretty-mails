<!doctype html>
<html lang="pl" style="--template-accent-1: var(--template-accent-1, #0f766e); --template-accent-2: var(--template-accent-2, #56b8ae); --template-accent-3: var(--template-accent-3, #0c4f4a);">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#eff8f6;color:#122623;font:16px/1.6 'Manrope','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #cbe2dd;border-radius:14px;background:#ffffff;border-spacing:0;overflow:hidden;">
    <tr>
      <td style="padding:0;">
        <div style="height:10px;background:linear-gradient(90deg,var(--template-accent-3),var(--template-accent-1),var(--template-accent-2));"></div>
      </td>
    </tr>
    <tr>
      <td style="padding:18px;display:grid;gap:12px;">
        <div style="padding:12px;border-radius:11px;border:1px solid #d4e8e3;background:#f6fcfa;">{{greeting_block}}</div>
        <div style="padding:12px;border-radius:11px;border:1px solid #d4e8e3;background:#ffffff;">{{content_block}}</div>
        <div style="padding:12px;border-radius:11px;border:1px solid #d4e8e3;background:#f6fcfa;">{{quote_block}}</div>
        <div style="padding:12px;border-radius:11px;border:1px solid #d4e8e3;background:#ffffff;">{{attachments_block}}</div>
        <div style="padding:12px;border-radius:11px;border:1px solid #d4e8e3;background:#f6fcfa;">{{signature_block}}</div>
      </td>
    </tr>
  </table>
</body>
</html>
