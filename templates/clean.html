<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:22px 12px;background:#f4f8ff;color:#122036;font:16px/1.6 'Inter','Avenir Next','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #d4deef;border-radius:12px;background:#ffffff;border-spacing:0;overflow:hidden;">
    <tr><td style="padding:14px 16px;border-bottom:1px solid #e2e8f4;background:#f8fbff;color:var(--template-accent-1);font-weight:700;letter-spacing:.04em;">Clean</td></tr>
    <tr><td style="padding:14px 16px;"><div style="padding:10px;border:1px solid #e2e8f4;border-radius:10px;background:#fbfdff;">{{greeting_block}}</div></td></tr>
    <tr><td style="padding:0 16px 14px;"><div style="padding:12px;border:1px solid #e2e8f4;border-radius:10px;background:#ffffff;">{{content_block}}</div></td></tr>
    <tr><td style="padding:0 16px 14px;"><div style="padding:12px;border:1px solid #e2e8f4;border-radius:10px;background:#f9fbff;">{{quote_block}}</div></td></tr>
    <tr><td style="padding:0 16px 14px;"><div style="padding:12px;border:1px solid #e2e8f4;border-radius:10px;background:#ffffff;">{{attachments_block}}</div></td></tr>
    <tr><td style="padding:0 16px 16px;"><div style="padding:12px;border:1px solid #e2e8f4;border-radius:10px;background:#f8fbff;">{{signature_block}}</div></td></tr>
  </table>
</body>
</html>
