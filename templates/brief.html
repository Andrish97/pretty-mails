<!doctype html>
<html lang="pl" style="--template-accent-1: var(--template-accent-1, #2e7dff); --template-accent-2: var(--template-accent-2, #59a3ff); --template-accent-3: var(--template-accent-3, #1d4fb8);">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#f3f8ff;color:#11233a;font:16px/1.6 'Inter','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #d3e0f3;border-radius:14px;background:#ffffff;border-spacing:0;overflow:hidden;">
    <tr>
      <td style="padding:14px 18px;background:linear-gradient(120deg,var(--template-accent-1),var(--template-accent-2));color:#ffffff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;border-radius:14px 14px 0 0;">Pretty Mails</td>
    </tr>
    <tr>
      <td style="padding:16px 18px;display:grid;gap:12px;">
        <div style="padding:12px;border:1px solid #dbe7f7;border-radius:10px;background:#f8fbff;">{{greeting_block}}</div>
        <div style="padding:12px;border:1px solid #dbe7f7;border-radius:10px;background:#ffffff;">{{content_block}}</div>
        <div style="padding:12px;border:1px solid #dbe7f7;border-radius:10px;background:#f8fbff;">{{quote_block}}</div>
        <div style="padding:12px;border:1px solid #dbe7f7;border-radius:10px;background:#ffffff;">{{attachments_block}}</div>
        <div style="padding:12px;border:1px solid #dbe7f7;border-radius:10px;background:#f8fbff;">{{signature_block}}</div>
      </td>
    </tr>
  </table>
</body>
</html>
