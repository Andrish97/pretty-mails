<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#eef7f5;color:#112723;font:16px/1.58 'Plus Jakarta Sans','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #cfe5e0;border-radius:14px;background:#ffffff;border-spacing:0;overflow:hidden;">
    <tr>
      <td style="padding:0;">
        <div style="height:10px;background:linear-gradient(90deg,var(--template-accent-1),var(--template-accent-2),var(--template-accent-3));"></div>
      </td>
    </tr>
    <tr><td style="padding:16px;">
      <div style="display:grid;gap:11px;">
        <div style="padding:11px;border:1px solid #d8ebe7;border-radius:10px;background:#f5fbfa;">{{greeting_block}}</div>
        <div style="padding:12px;border:1px solid #d8ebe7;border-radius:10px;background:#ffffff;">{{content_block}}</div>
        <div style="padding:12px;border:1px solid #d8ebe7;border-radius:10px;background:#f8fcfb;">{{quote_block}}</div>
        <div style="padding:12px;border:1px solid #d8ebe7;border-radius:10px;background:#ffffff;">{{attachments_block}}</div>
        <div style="padding:12px;border:1px solid #d8ebe7;border-radius:10px;background:#f5fbfa;">{{signature_block}}</div>
      </div>
    </td></tr>
  </table>
</body>
</html>
