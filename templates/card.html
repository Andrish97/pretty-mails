<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#eef6f5;color:#112522;font:16px/1.6 'Manrope','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #cde3df;border-radius:16px;background:#ffffff;border-spacing:0;overflow:hidden;box-shadow:0 10px 24px rgba(12,64,56,.08);">
    <tr>
      <td style="padding:16px 18px;background:linear-gradient(120deg,var(--template-accent-1),var(--template-accent-2));color:#ffffff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Card</td>
    </tr>
    <tr>
      <td style="padding:16px 18px;">
        <div style="display:grid;gap:12px;">
          <div style="padding:11px;border:1px solid #d8ebe7;border-radius:12px;background:#f4fbf9;">{{greeting_block}}</div>
          <div style="padding:12px;border:1px solid #d8ebe7;border-radius:12px;background:#ffffff;">{{content_block}}</div>
          <div style="padding:12px;border:1px solid #d8ebe7;border-radius:12px;background:#f8fcfb;">{{quote_block}}</div>
          <div style="padding:12px;border:1px solid #d8ebe7;border-radius:12px;background:#ffffff;">{{attachments_block}}</div>
          <div style="padding:12px;border:1px solid #d8ebe7;border-radius:12px;background:#f4fbf9;">{{signature_block}}</div>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
