<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#f8f4ee;color:#2a2119;font:16px/1.62 'Lora','Georgia',serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #e0d2c2;background:#fffdf8;border-spacing:0;">
    <tr>
      <td style="width:52px;border-right:1px solid #e3d8cb;background:repeating-linear-gradient(to bottom,#f2e6d9,#f2e6d9 1px,transparent 1px,transparent 34px);"></td>
      <td style="padding:16px;">
        <div style="display:grid;gap:10px;">
          <div style="padding:11px 12px;border:1px solid #e5dbcf;background:#fcf8f2;">{{greeting_block}}</div>
          <div style="padding:12px;border:1px solid #e5dbcf;background:#fffdfa;">{{content_block}}</div>
          <div style="padding:12px;border:1px solid #e5dbcf;background:#fcf8f2;">{{quote_block}}</div>
          <div style="padding:12px;border:1px solid #e5dbcf;background:#fffdfa;">{{attachments_block}}</div>
          <div style="padding:12px;border:1px solid #e5dbcf;background:#fcf8f2;">{{signature_block}}</div>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
