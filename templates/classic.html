<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#f2f6fd;color:#152338;font:16px/1.6 'Source Sans 3','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #ced8ea;background:#ffffff;border-spacing:0;">
    <tr>
      <td style="width:20px;background:linear-gradient(180deg,var(--template-accent-1),var(--template-accent-2));"></td>
      <td style="padding:18px 20px;">
        <div style="display:grid;gap:12px;">
          <div style="padding:10px 12px;border-bottom:2px solid #d7e1f1;background:#f8fbff;">{{greeting_block}}</div>
          <div style="padding:2px 0;">{{content_block}}</div>
          <div style="padding:12px;border:1px solid #d7e1f1;border-left:4px solid var(--template-accent-2);background:#f8fbff;">{{quote_block}}</div>
          <div style="padding:12px 0;border-top:1px solid #d7e1f1;border-bottom:1px solid #d7e1f1;">{{attachments_block}}</div>
          <div style="padding:12px;border:1px solid #d7e1f1;background:#f8fbff;">{{signature_block}}</div>
        </div>
      </td>
    </tr>
  </table>
</body>
</html>
