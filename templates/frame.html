<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:#f3f8ff;color:#12243d;font:16px/1.58 'Inter','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:2px solid var(--template-accent-1);padding:6px;background:#ffffff;border-spacing:0;">
    <tr><td style="border:1px solid #d8e3f4;padding:16px;">
      <div style="display:grid;gap:12px;">
        <div style="padding:11px;border:1px solid #dde7f6;background:#f8fbff;">{{greeting_block}}</div>
        <div style="padding:12px;border:1px solid #dde7f6;background:#ffffff;">{{content_block}}</div>
        <div style="padding:12px;border:1px solid #dde7f6;background:#f8fbff;">{{quote_block}}</div>
        <div style="padding:12px;border:1px solid #dde7f6;background:#ffffff;">{{attachments_block}}</div>
        <div style="padding:12px;border:1px solid #dde7f6;background:#f8fbff;">{{signature_block}}</div>
      </div>
    </td></tr>
  </table>
</body>
</html>
