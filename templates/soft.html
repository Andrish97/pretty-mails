<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:radial-gradient(circle at 0% 0%,rgba(120,102,220,.12),transparent 42%),radial-gradient(circle at 100% 100%,rgba(120,180,220,.12),transparent 40%),#f7f5ff;color:#1c1730;font:16px/1.6 'IBM Plex Sans','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #ddd6f3;border-radius:16px;background:rgba(255,255,255,.88);border-spacing:0;overflow:hidden;">
    <tr><td style="padding:16px 18px;color:var(--template-accent-1);font-weight:700;letter-spacing:.04em;">Soft</td></tr>
    <tr><td style="padding:0 18px 18px;">
      <div style="display:grid;gap:10px;">
        <div style="padding:12px;border:1px solid #e4def5;border-radius:14px;background:rgba(255,255,255,.72);">{{greeting_block}}</div>
        <div style="padding:12px;border:1px solid #e4def5;border-radius:14px;background:rgba(255,255,255,.84);">{{content_block}}</div>
        <div style="padding:12px;border:1px solid #e4def5;border-radius:14px;background:rgba(252,248,255,.82);">{{quote_block}}</div>
        <div style="padding:12px;border:1px solid #e4def5;border-radius:14px;background:rgba(255,255,255,.84);">{{attachments_block}}</div>
        <div style="padding:12px;border:1px solid #e4def5;border-radius:14px;background:rgba(252,248,255,.82);">{{signature_block}}</div>
      </div>
    </td></tr>
  </table>
</body>
</html>
