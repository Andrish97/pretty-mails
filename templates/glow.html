<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <meta name="x-apple-disable-message-reformatting">
</head>
<body style="margin:0;padding:24px 12px;background:radial-gradient(circle at 14% -5%,rgba(130,120,255,.2),transparent 40%),radial-gradient(circle at 100% 100%,rgba(90,190,255,.18),transparent 45%),#121727;color:#e8edff;font:16px/1.58 'IBM Plex Sans','Segoe UI',sans-serif;">
  <table role="presentation" style="width:100%;max-width:760px;margin:0 auto;border:1px solid #3a4260;border-radius:16px;background:#182033;border-spacing:0;overflow:hidden;box-shadow:0 20px 40px rgba(0,0,0,.35);">
    <tr><td style="padding:14px 18px;background:linear-gradient(120deg,var(--template-accent-1),var(--template-accent-2));color:#ffffff;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;">Glow</td></tr>
    <tr><td style="padding:16px 18px;">
      <div style="display:grid;gap:11px;">
        <div style="padding:11px;border:1px solid #3f4968;border-radius:12px;background:#1f2940;">{{greeting_block}}</div>
        <div style="padding:12px;border:1px solid #3f4968;border-radius:12px;background:#1a243a;">{{content_block}}</div>
        <div style="padding:12px;border:1px solid #3f4968;border-radius:12px;background:#1f2940;">{{quote_block}}</div>
        <div style="padding:12px;border:1px solid #3f4968;border-radius:12px;background:#1a243a;">{{attachments_block}}</div>
        <div style="padding:12px;border:1px solid #3f4968;border-radius:12px;background:#1f2940;">{{signature_block}}</div>
      </div>
    </td></tr>
  </table>
</body>
</html>
